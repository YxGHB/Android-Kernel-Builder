name: Build Xiaomi SDM710 Kernel
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y bc bison build-essential flex libelf-dev libssl-dev gcc-aarch64-linux-gnu git

      - name: Clone kernel source
        run: |
          git clone https://github.com/guoxiao1213/android_kernel_xiaomi_sdm710.git kernel
          cd kernel

      - name: Compile kernel (FINAL FIXED)
        run: |
          cd kernel
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          make O=out sdm710_defconfig
          make O=out -j2 KCFLAGS="-Wno-array-bounds -Wno-error"

      - name: Upload kernel file
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-SDM710
          path: kernel/out/arch/arm64/boot/Image.gz-dtb
